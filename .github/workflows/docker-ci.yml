name: Docker Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass123
          MYSQL_DATABASE: hospital
          MYSQL_USER: hospitaluser
          MYSQL_PASSWORD: password123
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: docker build -t hospital-app:${{ github.sha }} .

    - name: Start services with Docker Compose
      run: |
        docker-compose up -d
        sleep 10

    - name: Test application response
      run: |
        curl -f http://localhost:5000/ || exit 1

    - name: Check database connectivity
      run: |
        docker-compose exec -T database mysqladmin ping -h localhost -u hospitaluser -ppassword123

    - name: View application logs
      if: failure()
      run: docker-compose logs app

    - name: View database logs
      if: failure()
      run: docker-compose logs database

    - name: Clean up
      if: always()
      run: docker-compose down

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image for scanning
      run: docker build -t hospital-app:latest .

    - name: Scan Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: hospital-app:latest
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  publish:
    needs: [build-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/hospital-app:latest
          ${{ secrets.DOCKER_USERNAME }}/hospital-app:${{ github.sha }}
